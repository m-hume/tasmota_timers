enable_all_timers:
  name: Enable All Timers
  description: Enable all timers on a Tasmota device
  fields:
    device_topic:
      name: Device Topic
      description: The MQTT topic of the Tasmota device
      required: true
      example: "tasmota_switch1"
      selector:
        text:

disable_all_timers:
  name: Disable All Timers
  description: Disable all timers on a Tasmota device
  fields:
    device_topic:
      name: Device Topic
      description: The MQTT topic of the Tasmota device
      required: true
