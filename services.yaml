      selector:
        text:

get_timers:
  name: Get Timers
  description: Request current timer configuration from a Tasmota device
  fields:
    device_topic:
      name: Device Topic
      description: The MQTT topic of the Tasmota device
      required: true
      example: "tasmota_switch1"
      selector:
        text:
    timer_index:
      name: Timer Index
      description: Specific timer to retrieve (leave empty for all timers)
      required: false
      selector:
        number:
          min: 1
          max: 16
          mode: box
